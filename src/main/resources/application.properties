spring.application.name=BACKEND-VELOXA

# Variable para elegir la base de datos: mysql o sqlserver
app.database=mysql

# ============================================================================
# NOTA: Las contraseñas estan en application-secrets.properties (ignorado en git)
# ============================================================================

# Configuracion principal para DataSource (usada por Hibernate)
spring.datasource.url=jdbc:mysql://localhost:3306/veloxa_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${spring.datasource.mysql.username}
spring.datasource.password=${spring.datasource.mysql.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion para SQL Server (alternativa)
spring.datasource.sqlserver.url=jdbc:sqlserver://localhost:1433;databaseName=velotax;encrypt=true;trustServerCertificate=true
spring.datasource.sqlserver.username=sa
spring.datasource.sqlserver.password=${spring.datasource.sqlserver.password}
spring.datasource.sqlserver.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Configuracion para MySQL
spring.datasource.mysql.url=jdbc:mysql://localhost:3306/veloxa_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.mysql.username=root
spring.datasource.mysql.password=${spring.datasource.mysql.password}
spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Importar configuracion de secretos
spring.config.import=optional:classpath:application-secrets.properties
